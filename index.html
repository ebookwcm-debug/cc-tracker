<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CC Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4F6F9;--surface:#fff;--surface2:#F0F2F5;--border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.13);
  --text:#1a1a2e;--muted:#6b7280;--accent:#1F3864;--accent-bg:#EEF2FF;
  --red:#C92A2A;--red-bg:#FFF5F5;--amber:#C47D0E;--amber-bg:#FFF8EC;
  --green:#1A7A4A;--green-bg:#EDFAF3;--radius:10px;--radius-lg:14px;
  --shadow:0 1px 3px rgba(0,0,0,0.06),0 1px 2px rgba(0,0,0,0.04);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:14px;min-height:100vh}

/* Header */
.hdr{background:var(--accent);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:52px;position:sticky;top:0;z-index:200;box-shadow:0 1px 4px rgba(0,0,0,0.15)}
.logo{font-size:15px;font-weight:600;color:#fff;letter-spacing:-0.3px}
.logo span{opacity:.4}
.hdr-meta{font-size:11px;color:rgba(255,255,255,.55);font-family:'DM Mono',monospace}
.hdr-btn{background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.2);color:#fff;padding:5px 12px;border-radius:7px;font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif}
.hdr-btn:hover{background:rgba(255,255,255,.25)}

/* Layout */
.main{max-width:1120px;margin:0 auto;padding:20px 16px}

/* Tabs */
.tabs{display:flex;gap:2px;background:var(--surface);border-radius:10px;padding:4px;margin-bottom:20px;border:1px solid var(--border);width:fit-content;box-shadow:var(--shadow)}
.tab{padding:7px 16px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s;color:var(--muted);border:none;background:none;font-family:'DM Sans',sans-serif}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){color:var(--text);background:var(--surface2)}
.tab-pane{display:none}.tab-pane.active{display:block}

/* KPIs */
.kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.kpi{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow)}
.kpi-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px;font-weight:500}
.kpi-val{font-size:24px;font-weight:600;line-height:1;letter-spacing:-.5px;color:var(--text)}
.kpi-sub{font-size:12px;color:var(--muted);margin-top:5px}
.kpi.danger .kpi-val{color:var(--red)}.kpi.warn .kpi-val{color:var(--amber)}.kpi.good .kpi-val{color:var(--green)}.kpi.accent .kpi-val{color:var(--accent)}

/* Section */
.sec{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:16px;overflow:hidden;box-shadow:var(--shadow)}
.sec-hdr{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.sec-title{font-size:13px;font-weight:600;color:var(--text);display:flex;align-items:center;gap:7px}
.badge-cnt{background:var(--surface2);color:var(--muted);font-size:11px;padding:2px 8px;border-radius:20px;font-family:'DM Mono',monospace}

/* Table */
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;padding:9px 14px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap;background:var(--surface2)}
td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text)}
tr:last-child td{border-bottom:none}
tr.overdue td{background:var(--red-bg)}
tr.soon td{background:var(--amber-bg)}
tr.non-personal td{opacity:.55}
tr:not(.overdue):not(.soon):hover td{background:#F8F9FC}

/* Badges */
.bdg{display:inline-flex;align-items:center;font-size:11px;font-weight:500;padding:2px 8px;border-radius:20px;white-space:nowrap}
.bdg.overdue{background:var(--red-bg);color:var(--red);border:1px solid rgba(201,42,42,.15)}
.bdg.soon{background:var(--amber-bg);color:var(--amber);border:1px solid rgba(196,125,14,.15)}
.bdg.ok{background:var(--green-bg);color:var(--green);border:1px solid rgba(26,122,74,.15)}
.bdg.paid{background:var(--green-bg);color:var(--green);border:1px solid rgba(26,122,74,.15)}

/* Editable */
.editable{cursor:pointer;padding:3px 7px;border-radius:6px;border:1px solid transparent;transition:all .15s;min-width:50px;display:inline-block}
.editable:hover{background:var(--surface2);border-color:var(--border2)}
.editable:empty::after{content:'—';color:var(--muted)}
.editable:focus{outline:none;background:#fff;border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,56,100,.1)}

/* Form controls */
.sel{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:5px 8px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer}
.sel:focus{border-color:var(--accent)}
.inp{background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:5px 10px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 2px rgba(31,56,100,.08)}
.inp::placeholder{color:var(--muted)}
.cbx{width:15px;height:15px;cursor:pointer;accent-color:var(--green)}

/* Amount */
.amt{font-family:'DM Mono',monospace;font-size:12px;font-weight:500}
.amt.red{color:var(--red)}.amt.green{color:var(--green)}.amt.muted{color:var(--muted)}

/* Card cell */
.cc .name{font-weight:500;font-size:13px}
.cc .bank{font-size:11px;color:var(--muted);margin-top:1px}

/* Filter row */
.frow{display:flex;gap:7px;align-items:center;flex-wrap:wrap}

/* Buttons */
.btn{padding:6px 12px;border-radius:7px;font-size:12px;cursor:pointer;border:1px solid var(--border2);background:var(--surface);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:500;transition:all .15s}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.btn.primary:hover{background:#162A4E}
.btn.sm{padding:4px 9px;font-size:11px}

/* Toast */
.toast{position:fixed;bottom:22px;right:22px;background:var(--surface);border:1px solid var(--border2);color:var(--text);padding:10px 15px;border-radius:10px;font-size:13px;z-index:999;opacity:0;transform:translateY(6px);transition:all .2s;pointer-events:none;box-shadow:0 4px 12px rgba(0,0,0,.1)}
.toast.show{opacity:1;transform:translateY(0)}
.toast.ok{color:var(--green)}.toast.err{color:var(--red)}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:500;display:none;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:14px;padding:22px 24px;width:340px;box-shadow:0 8px 32px rgba(0,0,0,.15)}
.modal h3{font-size:15px;font-weight:600;margin-bottom:14px}
.modal-row{display:flex;gap:8px;margin-bottom:10px}
.modal-row .inp{flex:1}

/* Chart area */
.chart-wrap{padding:18px 20px}
.chart-top{display:flex;align-items:center;gap:10px;margin-bottom:16px;flex-wrap:wrap}
.chart-container{display:flex;gap:24px;align-items:flex-start;flex-wrap:wrap}
.chart-canvas{flex-shrink:0}
.chart-legend{flex:1;min-width:180px}
.legend-item{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:opacity .15s}
.legend-item:last-child{border:none}
.legend-item:hover{opacity:.75}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0}
.legend-name{flex:1;font-size:13px}
.legend-amt{font-family:'DM Mono',monospace;font-size:12px;font-weight:500;color:var(--text)}
.legend-pct{font-size:11px;color:var(--muted);margin-left:4px}

/* Textarea */
textarea.remark{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 7px;border-radius:6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;resize:none;width:130px}
textarea.remark:focus{border-color:var(--accent);background:#fff}

/* Empty/loading */
.empty{padding:32px;text-align:center;color:var(--muted);font-size:13px}
.loading{padding:26px;text-align:center;color:var(--muted);font-size:13px}
.spin{display:inline-block;width:15px;height:15px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:7px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:640px){
  .kpis{grid-template-columns:repeat(2,1fr)}
  .kpi-val{font-size:20px}
  th,td{padding:8px 10px}
}
</style>
</head>
<body>
<div id="pw-screen" style="position:fixed;inset:0;background:#F4F6F9;z-index:9999;display:flex;align-items:center;justify-content:center">
<div style="background:#fff;border:1px solid rgba(0,0,0,0.08);border-radius:16px;padding:36px 32px;width:320px;box-shadow:0 4px 24px rgba(0,0,0,0.08);text-align:center">
  <div style="font-size:28px;margin-bottom:12px">💳</div>
  <div style="font-size:17px;font-weight:600;color:#1F3864;margin-bottom:4px">CC Tracker</div>
  <div style="font-size:13px;color:#6b7280;margin-bottom:24px">請輸入密碼</div>
  <input id="pw-input" type="password" placeholder="密碼" style="width:100%;padding:10px 14px;border:1px solid rgba(0,0,0,0.13);border-radius:9px;font-size:14px;font-family:inherit;outline:none;margin-bottom:10px;box-sizing:border-box"
    onkeydown="if(event.key==='Enter')checkPw()">
  <div id="pw-err" style="font-size:12px;color:#C92A2A;margin-bottom:10px;min-height:18px"></div>
  <button onclick="checkPw()" style="width:100%;background:#1F3864;color:#fff;border:none;padding:11px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit">進入</button>
</div>
</div>
<script>
(function(){
  const KEY='cc_auth';
  if(sessionStorage.getItem(KEY)==='1') document.getElementById('pw-screen').style.display='none';
  document.getElementById('pw-input').focus();
})();
function checkPw(){
  const v=document.getElementById('pw-input').value;
  const h=Array.from(new TextEncoder().encode(v)).reduce((a,b)=>Math.imul(31,a)+b|0,0).toString(16);
  if(h==='fed19158'){
    sessionStorage.setItem('cc_auth','1');
    document.getElementById('pw-screen').style.display='none';
  } else {
    document.getElementById('pw-err').textContent='密碼錯誤，請再試';
    document.getElementById('pw-input').value='';
    document.getElementById('pw-input').focus();
  }
}
</script>

<div class="hdr">
  <div style="display:flex;align-items:center;gap:14px">
    <div class="logo">CC<span>/</span>Tracker</div>
    <div class="hdr-meta" id="last-update">載入中...</div>
  </div>
  <div style="display:flex;gap:8px">
    <button class="hdr-btn" onclick="loadAll()">↺ 重新整理</button>
  </div>
</div>

    <button class="tab" onclick="switchTab('pending')">待還款</button>

      <div class="kpi warn"><div class="kpi-lbl">即將到期</div><div class="kpi-val" id="k-soon">--</div><div class="kpi-sub">7日內到期</div></div>

        </tr></thead>

  <!-- Pending -->

      </div>

  <!-- Transactions -->
  <div id="tab-txn" class="tab-pane">

        <div class="frow">

          <select class="sel" id="tx-month" onchange="renderTxn()"><option value="">全部月份</option></select>

          <select class="sel" id="tx-personal" onchange="renderTxn()">
            <option value="">全部</option>
            <option value="1">個人支出</option>

          </select>
          <button class="btn" onclick="exportCSV()">↓ CSV</button>
          <button class="btn primary" onclick="openCatModal()">+ 類別</button>
        </div>
      </div>
      <div class="tbl-wrap"><table>
        <thead><tr>
          <th style="width:9%">交易日期</th><th style="width:9%">貼上日期</th>
          <th style="width:21%">描述</th><th style="width:11%">銀行/卡</th>
          <th style="width:9%">金額</th><th style="width:10%">類別</th>
          <th style="width:8%">月份</th><th style="width:5%">個人</th>
          <th style="width:18%">備註</th>
        </tr></thead>
        <tbody id="tx-body"><tr><td colspan="9" class="loading"><span class="spin"></span>載入中...</td></tr></tbody>
      </table></div>
    </div>
  </div>

  <!-- Chart -->
  <div id="tab-chart" class="tab-pane">
    <div class="sec">
      <div class="sec-hdr">
        <div class="sec-title">個人支出分析</div>
        <div class="frow">
          <select class="sel" id="ch-month" onchange="renderChart()"><option value="">全部月份</option></select>
        </div>
      </div>
      <div class="chart-wrap">
        <div id="chart-empty" class="empty" style="display:none">沒有個人支出數據</div>
        <div class="chart-container" id="chart-container">
          <canvas id="pie-canvas" width="240" height="240" class="chart-canvas"></canvas>
          <div class="chart-legend" id="chart-legend"></div>
        </div>
        <div style="margin-top:16px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center">
          <span style="font-size:12px;color:var(--muted)">個人支出總額（不含退款／內部帳戶）</span>
          <span style="font-size:15px;font-weight:600;font-family:'DM Mono',monospace" id="chart-total">HK$0.00</span>
        </div>
      </div>
    </div>
  </div>
</div>

</div>

<script>
const SUPA='https://vedgmqusdsxmymwnkpnz.supabase.co/rest/v1';
const KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZlZGdtcXVzZHN4bXltd25rcG56Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NjcyOTg1MSwiZXhwIjoyMDkyMzA1ODUxfQ.fZH238oFdRRZQljilTXf-N15rlZGf-Ct9cTtYuW2c6c';
const RH={'apikey':KEY,'Authorization':'Bearer '+KEY};
const WH={...RH,'Content-Type':'application/json','Prefer':'return=minimal'};

const DEFAULT_CATS=['餐飲','交通','購物','保險','電訊','串流媒體','教育','醫療','退款','其他'];
const PIE_COLORS=['#1F3864','#2E75B6','#4E96D5','#70B8E8','#1A7A4A','#2CAE6A','#C47D0E','#E8A020','#C92A2A','#E85555','#7B2D8B','#9B59B6','#666'];

let allCards=[], allTxns=[], filteredTxns=[], userCats=[], allCats=[...DEFAULT_CATS];

/* ── Helpers ── */
function fmt2(n){return 'HK$'+Number(n).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});}
function fmt0(n){return 'HK$'+Math.round(Number(n)).toLocaleString('en');}
function daysDiff(d){if(!d)return null;return Math.floor((new Date(d)-new Date().setHours(0,0,0,0))/86400000);}
function toast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',2200);}

async function apiFetch(path,opts={}){
  const r=await fetch(SUPA+path,{headers:RH,...opts});
  return r;
}

/* ── Status ── */
function statusBadge(row){
  if(row.paid)return '<span class="bdg paid">✅ 已還</span>';
  const d=daysDiff(row.due_date);
  if(d===null)return '<span class="bdg ok">—</span>';
  if(d<0)return `<span class="bdg overdue">逾期 ${Math.abs(d)}日</span>`;
  if(d<=7)return `<span class="bdg soon">${d}日後到期</span>`;
  return '<span class="bdg ok">正常</span>';
}
function rowCls(row){
  if(row.paid)return '';
  const d=daysDiff(row.due_date);
  if(d!==null&&d<0)return 'overdue';
  if(d!==null&&d<=7)return 'soon';
  return '';
}

/* ── Editable ── */
function editable(val,id,field,table){
  const v=val||'';
  return `<span class="editable" contenteditable="true" data-id="${id}" data-field="${field}" data-table="${table}" data-orig="${v.replace(/"/g,'&quot;')}"
    onblur="saveEdit(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur()}">${v}</span>`;
}
async function saveEdit(el){
  const val=el.textContent.trim();
  if(val===el.dataset.orig)return;
  el.dataset.orig=val;
  const r=await fetch(`${SUPA}/${el.dataset.table}?id=eq.${el.dataset.id}`,{method:'PATCH',headers:WH,body:JSON.stringify({[el.dataset.field]:val||null})});
  if(r.ok){toast('已儲存');const arr=el.dataset.table==='credit_cards'?allCards:allTxns;const row=arr.find(x=>x.id===el.dataset.id);if(row)row[el.dataset.field]=val||null;}
  else toast('儲存失敗','err');
}

/* ── Toggle paid ── */
async function togglePaid(id,checked){
  const row=allCards.find(r=>r.id===id);if(!row)return;
  row.paid=checked;
  await fetch(`${SUPA}/credit_cards?id=eq.${id}`,{method:'PATCH',headers:WH,body:JSON.stringify({paid:checked})});
  toast(checked?'已標記還款':'已取消');renderAll();
}

/* ── Toggle personal ── */
async function togglePersonal(id,checked){
  const t=allTxns.find(r=>r.id===id);if(!t)return;
  t.is_personal=checked;
  await fetch(`${SUPA}/transactions?id=eq.${id}`,{method:'PATCH',headers:WH,body:JSON.stringify({is_personal:checked})});
  toast(checked?'標記個人支出':'標記非個人');
  renderTxn(); renderChart();
}

/* ── Category select ── */
function catSelect(txn){
  const opts=allCats.map(c=>`<option value="${c}"${c===txn.category?' selected':''}>${c}</option>`).join('');
  return `<select class="sel" style="font-size:11px;padding:3px 6px" onchange="saveCat('${txn.id}',this.value)">${opts}</select>`;
}
async function saveCat(id,val){
  const t=allTxns.find(r=>r.id===id);if(t)t.category=val;
  await fetch(`${SUPA}/transactions?id=eq.${id}`,{method:'PATCH',headers:WH,body:JSON.stringify({category:val})});
  toast('類別已更新');renderChart();
}

/* ── Filters: populate ── */
function populateFilters(){
  const months=[...new Set([...allCards,...allTxns].map(x=>x.statement_month).filter(Boolean))].sort().reverse();
  const banks=[...new Set(allCards.map(c=>c.bank).filter(Boolean))].sort();
  const cards=[...new Set(allTxns.map(t=>t.card_name).filter(Boolean))].sort();
  const cats=[...new Set(allTxns.map(t=>t.category).filter(Boolean))].sort();

  // Overview filters
  const om=document.getElementById('ov-month'),omv=om.value;
  om.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}"${m===omv?' selected':''}>${m}</option>`).join('');
  const ob=document.getElementById('ov-bank'),obv=ob.value;
  ob.innerHTML='<option value="">全部銀行</option>'+banks.map(b=>`<option value="${b}"${b===obv?' selected':''}>${b}</option>`).join('');

  // Txn filters
  const tm=document.getElementById('tx-month'),tmv=tm.value;
  tm.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}"${m===tmv?' selected':''}>${m}</option>`).join('');
  const tc=document.getElementById('tx-card'),tcv=tc.value;
  tc.innerHTML='<option value="">全部信用卡</option>'+cards.map(c=>`<option value="${c}"${c===tcv?' selected':''}>${c}</option>`).join('');
  const tcat=document.getElementById('tx-cat'),tcatv=tcat.value;
  tcat.innerHTML='<option value="">全部類別</option>'+cats.map(c=>`<option value="${c}"${c===tcatv?' selected':''}>${c}</option>`).join('');

  // Chart month
  const cm=document.getElementById('ch-month'),cmv=cm.value;
  cm.innerHTML='<option value="">全部月份</option>'+months.map(m=>`<option value="${m}"${m===cmv?' selected':''}>${m}</option>`).join('');
}

/* ── KPIs ── */
function getLatest(cards){
  const map={};
  for(const c of cards){const k=c.card_name;if(!map[k]||c.statement_date>map[k].statement_date)map[k]=c;}
  return Object.values(map);
}
function updateKPIs(){
  const latest=getLatest(allCards);
  const unpaid=latest.filter(c=>!c.paid);
  const total=unpaid.reduce((s,c)=>s+Number(c.outstanding||0),0);
  const overdue=unpaid.filter(c=>{const d=daysDiff(c.due_date);return d!==null&&d<0;}).length;
  const soon=unpaid.filter(c=>{const d=daysDiff(c.due_date);return d!==null&&d>=0&&d<=7;}).length;
  const curMon=new Date().toISOString().slice(0,7);
  const paid=latest.filter(c=>c.paid&&c.statement_month===curMon).length;
  document.getElementById('k-total').textContent=fmt0(total);
  document.getElementById('k-cards').textContent=latest.length+' 張信用卡（最新期）';
  document.getElementById('k-overdue').textContent=overdue;
  document.getElementById('k-soon').textContent=soon;
  document.getElementById('k-paid').textContent=paid;
}

/* ── Overview ── */
function renderOverview(){
  const mf=document.getElementById('ov-month').value;
  const bf=document.getElementById('ov-bank').value;
  let data=mf?allCards.filter(c=>c.statement_month===mf):getLatest(allCards);
  if(bf)data=data.filter(c=>c.bank===bf);
  data.sort((a,b)=>(a.due_date||'')>(b.due_date||'')?1:-1);
  document.getElementById('ov-cnt').textContent=data.length;
  if(!data.length){document.getElementById('ov-body').innerHTML='<tr><td colspan="9" class="empty">沒有記錄</td></tr>';return;}
  document.getElementById('ov-body').innerHTML=data.map(c=>`
    <tr class="${rowCls(c)}">
      <td><div class="cc"><div class="name">${c.card_name}</div><div class="bank">${c.bank||''}</div></div></td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${c.statement_month||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${c.statement_date||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px${!c.paid&&daysDiff(c.due_date)<0?';color:var(--red);font-weight:500':''}">${c.due_date||'—'}</td>
      <td><span class="amt ${!c.paid?'red':'muted'}">${fmt2(c.outstanding||0)}</span></td>
      <td style="text-align:center"><input type="checkbox" class="cbx" ${c.paid?'checked':''} onchange="togglePaid('${c.id}',this.checked)"></td>
      <td>${editable(c.paid_method,c.id,'paid_method','credit_cards')}</td>
      <td>${editable(c.paid_date,c.id,'paid_date','credit_cards')}</td>
      <td>${statusBadge(c)}</td>
    </tr>`).join('');
}

/* ── Pending ── */
function renderPending(){
  const latest=getLatest(allCards);
  const pd=latest.filter(c=>!c.paid).sort((a,b)=>(a.due_date||'')>(b.due_date||'')?1:-1);
  document.getElementById('pd-cnt').textContent=pd.length;
  if(!pd.length){document.getElementById('pd-body').innerHTML='<tr><td colspan="8" class="empty" style="color:var(--green)">✅ 全部已還款</td></tr>';return;}
  document.getElementById('pd-body').innerHTML=pd.map(c=>{
    const d=daysDiff(c.due_date);
    const ds=d===null?'—':d<0?`<span style="color:var(--red);font-weight:500">逾期 ${Math.abs(d)} 日</span>`:d<=7?`<span style="color:var(--amber);font-weight:500">${d} 日後</span>`:`${d} 日後`;
    return `<tr class="${rowCls(c)}">
      <td><div class="cc"><div class="name">${c.card_name}</div><div class="bank">${c.bank||''}</div></div></td>
      <td style="font-family:'DM Mono',monospace;font-size:12px${d!==null&&d<0?';color:var(--red);font-weight:500':''}">${c.due_date||'—'}</td>
      <td><span class="amt red">${fmt2(c.outstanding||0)}</span></td>
      <td style="font-size:12px">${ds}</td>
      <td>${editable(c.paid_method,c.id,'paid_method','credit_cards')}</td>
      <td>${editable(c.paid_date,c.id,'paid_date','credit_cards')}</td>
      <td style="text-align:center"><input type="checkbox" class="cbx" onchange="togglePaid('${c.id}',this.checked)"></td>
      <td>${statusBadge(c)}</td>
    </tr>`;
  }).join('');
}

/* ── Transactions ── */
function renderTxn(){
  const search=document.getElementById('tx-search').value.toLowerCase().trim();
  const mf=document.getElementById('tx-month').value;
  const cf=document.getElementById('tx-card').value;
  const cat=document.getElementById('tx-cat').value;
  const pf=document.getElementById('tx-personal').value;
  filteredTxns=[...allTxns];
  if(search)filteredTxns=filteredTxns.filter(t=>(t.description||'').toLowerCase().includes(search)||(t.card_name||'').toLowerCase().includes(search));
  if(mf)filteredTxns=filteredTxns.filter(t=>t.statement_month===mf);
  if(cf)filteredTxns=filteredTxns.filter(t=>t.card_name===cf);
  if(cat)filteredTxns=filteredTxns.filter(t=>t.category===cat);
  if(pf==='1')filteredTxns=filteredTxns.filter(t=>t.is_personal!==false);
  if(pf==='0')filteredTxns=filteredTxns.filter(t=>t.is_personal===false);
  filteredTxns.sort((a,b)=>(b.trans_date||'')>(a.trans_date||'')?1:-1);
  document.getElementById('tx-cnt').textContent=filteredTxns.length;
  if(!filteredTxns.length){document.getElementById('tx-body').innerHTML='<tr><td colspan="9" class="empty">沒有記錄</td></tr>';return;}
  document.getElementById('tx-body').innerHTML=filteredTxns.map(t=>{
    const amt=Number(t.amount||0);const isCredit=amt<0;
    const isPersonal=t.is_personal!==false;
    return `<tr class="${!isPersonal?'non-personal':''}">
      <td style="font-family:'DM Mono',monospace;font-size:12px">${t.trans_date||'—'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${t.post_date||'—'}</td>
      <td style="max-width:170px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.description||''}">${t.description||'—'}</td>
      <td><div class="cc"><div class="bank" style="font-size:12px">${t.bank||''}</div><div style="font-size:11px;color:var(--muted)">${t.card_name||''}</div></div></td>
      <td><span class="amt ${isCredit?'green':'red'}">${isCredit?'-':''}HK$${Math.abs(amt).toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})}</span></td>
      <td>${catSelect(t)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:11px;color:var(--muted)">${t.statement_month||'—'}</td>
      <td style="text-align:center"><input type="checkbox" class="cbx" title="個人支出" ${isPersonal?'checked':''} onchange="togglePersonal('${t.id}',this.checked)"></td>
      <td><textarea class="remark" rows="1" placeholder="備註..." onblur="saveRemark('${t.id}',this.value)">${t.user_remark||''}</textarea></td>
    </tr>`;
  }).join('');
}
async function saveRemark(id,val){
  const t=allTxns.find(r=>r.id===id);if(t&&t.user_remark!==val){t.user_remark=val;await fetch(`${SUPA}/transactions?id=eq.${id}`,{method:'PATCH',headers:WH,body:JSON.stringify({user_remark:val})});toast('備註已儲存');}
}

/* ── Export CSV ── */
function exportCSV(){
  const rows=filteredTxns.length?filteredTxns:allTxns;
  const hdrs=['交易日期','貼上日期','交易描述','銀行','信用卡','金額(HKD)','類別','月份','個人支出','備註'];
  const lines=[hdrs.join(','),...rows.map(t=>[
    t.trans_date||'',t.post_date||'',
    `"${(t.description||'').replace(/"/g,'""')}"`,
    t.bank||'',t.card_name||'',
    Number(t.amount||0).toFixed(2),
    t.category||'',t.statement_month||'',
    t.is_personal===false?'否':'是',
    `"${(t.user_remark||'').replace(/"/g,'""')}"`
  ].join(','))];
  const blob=new Blob(['\uFEFF'+lines.join('\n')],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`transactions_${new Date().toISOString().slice(0,10)}.csv`;a.click();
  toast('CSV 已匯出');
}

/* ── Pie Chart ── */
function renderChart(){
  const mf=document.getElementById('ch-month').value;
  let data=allTxns.filter(t=>t.is_personal!==false&&Number(t.amount||0)>0&&t.category!=='退款');
  if(mf)data=data.filter(t=>t.statement_month===mf);
  const cats={};
  for(const t of data)cats[t.category||'其他']=(cats[t.category||'其他']||0)+Number(t.amount);
  const sorted=Object.entries(cats).sort((a,b)=>b[1]-a[1]);
  const total=sorted.reduce((s,[,v])=>s+v,0);
  document.getElementById('chart-total').textContent=fmt2(total);
  if(!sorted.length){
    document.getElementById('chart-empty').style.display='block';
    document.getElementById('chart-container').style.display='none';
    return;
  }
  document.getElementById('chart-empty').style.display='none';
  document.getElementById('chart-container').style.display='flex';
  const canvas=document.getElementById('pie-canvas');
  const ctx=canvas.getContext('2d');
  const cx=120,cy=120,r=100;
  ctx.clearRect(0,0,240,240);
  let angle=-Math.PI/2;
  sorted.forEach(([cat,val],i)=>{
    const slice=(val/total)*2*Math.PI;
    ctx.beginPath();ctx.moveTo(cx,cy);
    ctx.arc(cx,cy,r,angle,angle+slice);
    ctx.closePath();
    ctx.fillStyle=PIE_COLORS[i%PIE_COLORS.length];
    ctx.fill();
    ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
    angle+=slice;
  });
  // Inner circle (donut)
  ctx.beginPath();ctx.arc(cx,cy,52,0,2*Math.PI);
  ctx.fillStyle='#fff';ctx.fill();
  // Center text
  ctx.fillStyle='#1a1a2e';ctx.font='500 11px DM Sans,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(mf||'全部',cx,cy-7);
  ctx.font='600 13px DM Mono,monospace';
  ctx.fillText(fmt0(total).replace('HK$','$'),cx,cy+9);

  // Legend
  document.getElementById('chart-legend').innerHTML=sorted.map(([cat,val],i)=>`
    <div class="legend-item">
      <div class="legend-dot" style="background:${PIE_COLORS[i%PIE_COLORS.length]}"></div>
      <div class="legend-name">${cat}</div>
      <div class="legend-amt">${fmt2(val)}</div>
      <div class="legend-pct">${(val/total*100).toFixed(1)}%</div>
    </div>`).join('');
}

/* ── Category Modal ── */
function openCatModal(){
  renderCatList();
  document.getElementById('cat-modal').classList.add('open');
  document.getElementById('new-cat-input').focus();
}
function closeCatModal(){document.getElementById('cat-modal').classList.remove('open');}
document.getElementById('cat-modal').addEventListener('click',function(e){if(e.target===this)closeCatModal();});

function renderCatList(){
  const list=document.getElementById('cat-list');
  list.innerHTML=allCats.map(c=>`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border)">
      <span style="font-size:13px">${c}</span>
      ${!DEFAULT_CATS.includes(c)?`<button class="btn sm" onclick="deleteCat('${c}')">刪除</button>`:'<span style="font-size:11px;color:var(--muted)">預設</span>'}
    </div>`).join('');
}

async function addCat(){
  const input=document.getElementById('new-cat-input');
  const name=input.value.trim();
  if(!name||allCats.includes(name)){toast('類別已存在或名稱為空','err');return;}
  const r=await fetch(`${SUPA}/categories`,{method:'POST',headers:WH,body:JSON.stringify({name})});
  if(r.ok){userCats.push(name);allCats=[...DEFAULT_CATS,...userCats];input.value='';renderCatList();populateFilters();toast('類別已新增');}
  else toast('新增失敗','err');
}

async function deleteCat(name){
  const r=await fetch(`${SUPA}/categories?name=eq.${encodeURIComponent(name)}`,{method:'DELETE',headers:WH});
  if(r.ok){userCats=userCats.filter(c=>c!==name);allCats=[...DEFAULT_CATS,...userCats];renderCatList();populateFilters();toast('已刪除');}
  else toast('刪除失敗','err');
}

/* ── Load All ── */
async function loadAll(){
  document.getElementById('last-update').textContent='載入中...';
  try{
    const [r1,r2,r3]=await Promise.all([
      fetch(`${SUPA}/credit_cards?order=statement_date.desc&limit=500`,{headers:RH}),
      fetch(`${SUPA}/transactions?order=trans_date.desc&limit=2000`,{headers:RH}),
      fetch(`${SUPA}/categories?order=name.asc`,{headers:RH})
    ]);
    if(!r1.ok)throw new Error('cards '+r1.status);
    if(!r2.ok)throw new Error('txns '+r2.status);
    allCards=await r1.json();
    allTxns=await r2.json();
    const cats=r3.ok?await r3.json():[];
    userCats=cats.map(c=>c.name);
    allCats=[...DEFAULT_CATS,...userCats.filter(c=>!DEFAULT_CATS.includes(c))];
    filteredTxns=[...allTxns];
    renderAll();
    document.getElementById('last-update').textContent='更新：'+new Date().toLocaleString('zh-HK',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
  }catch(e){
    document.getElementById('last-update').textContent='載入失敗：'+e.message;
    toast('載入失敗：'+e.message,'err');
  }
}

function renderAll(){
  populateFilters();updateKPIs();renderOverview();renderPending();renderTxn();renderChart();
}

function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{t.classList.toggle('active',['overview','pending','txn','chart'][i]===name);});
  document.querySelectorAll('.tab-pane').forEach(el=>{el.classList.toggle('active',el.id==='tab-'+name);});
}

loadAll();
</script>
