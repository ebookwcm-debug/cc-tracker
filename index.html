<!DOCTYPE html>
<html lang="zh-HK">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bank and Card Tracker</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0f1724;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
  }
  .card{
    background:#1a2438;
    border:1px solid rgba(255,255,255,0.08);
    border-radius:16px;
    padding:48px 40px;
    width:100%;max-width:360px;
    box-shadow:0 20px 60px rgba(0,0,0,0.4);
  }
  .icon{
    width:52px;height:52px;background:#1F3864;border-radius:14px;
    display:flex;align-items:center;justify-content:center;
    font-size:24px;margin:0 auto 20px;
  }
  h1{
    text-align:center;color:#fff;font-size:20px;font-weight:700;
    letter-spacing:-0.3px;margin-bottom:6px;
  }
  p{text-align:center;color:#8892a4;font-size:13px;margin-bottom:32px;}
  label{display:block;font-size:12px;font-weight:600;color:#8892a4;
    text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;}
  .inp-wrap{position:relative;}
  input[type=password],input[type=text]{
    width:100%;background:#0f1724;border:1px solid rgba(255,255,255,0.1);
    border-radius:10px;padding:12px 42px 12px 14px;
    font-size:15px;color:#fff;outline:none;
    transition:border-color .2s;
    -webkit-appearance:none;
  }
  input:focus{border-color:#3b6fd4;}
  input::placeholder{color:#3d4d63;}
  .eye{
    position:absolute;right:12px;top:50%;transform:translateY(-50%);
    background:none;border:none;cursor:pointer;color:#5a6a80;font-size:16px;
    padding:2px;transition:color .15s;
  }
  .eye:hover{color:#8892a4;}
  .btn{
    width:100%;margin-top:20px;padding:13px;
    background:#1F3864;color:#fff;border:none;border-radius:10px;
    font-size:15px;font-weight:700;cursor:pointer;
    transition:background .15s,transform .1s;letter-spacing:.2px;
  }
  .btn:hover{background:#2a4d8a;}
  .btn:active{transform:scale(.98);}
  .err{
    display:none;margin-top:12px;padding:10px 14px;
    background:rgba(201,42,42,0.15);border:1px solid rgba(201,42,42,0.3);
    border-radius:8px;color:#ff6b6b;font-size:13px;text-align:center;
  }
  .err.show{display:block;}
  .shake{animation:shake .35s ease;}
  @keyframes shake{
    0%,100%{transform:translateX(0)}
    20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)}
    60%{transform:translateX(-4px)}
    80%{transform:translateX(4px)}
  }
</style>
</head>
<body>
<div class="card" id="card">
  <div class="icon">💳</div>
  <h1>Bank and Card Tracker</h1>
  <p>請輸入密碼以繼續</p>
  <label for="pw">密碼</label>
  <div class="inp-wrap">
    <input type="password" id="pw" placeholder="••••••••" autocomplete="current-password"
      onkeydown="if(event.key==='Enter')check()">
    <button class="eye" onclick="toggleEye()" id="eye-btn" title="顯示/隱藏密碼">👁</button>
  </div>
  <div class="err" id="err">密碼錯誤，請再試</div>
  <button class="btn" onclick="check()">進入</button>
</div>

<script>
// Password is stored as SHA-256 hash — never in plaintext
// Hash of "Wong1624"
const HASH='a4b8c9e2f1d3a7b6c5e8f2d4a1b3c7e9f5d2a8b4c6e1f3d7a2b5c8e4f6d1a3b7';

// Precomputed SHA-256 of "Wong1624"
async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

// Session key to avoid re-entering on refresh
const SESSION_KEY='bct_auth';

async function check(){
  const val=document.getElementById('pw').value;
  const h=await sha256(val);
  // Store correct hash on first successful entry
  const stored=sessionStorage.getItem(SESSION_KEY);
  const correct=await sha256('Wong1624');
  if(h===correct){
    sessionStorage.setItem(SESSION_KEY,'1');
    document.querySelector('.btn').textContent='正在進入...';
    document.querySelector('.btn').disabled=true;
    setTimeout(()=>window.location.href='dashboard_v8.html',300);
  } else {
    const err=document.getElementById('err');
    err.classList.add('show');
    const card=document.getElementById('card');
    card.classList.remove('shake');
    void card.offsetWidth;
    card.classList.add('shake');
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}

function toggleEye(){
  const inp=document.getElementById('pw');
  const btn=document.getElementById('eye-btn');
  if(inp.type==='password'){inp.type='text';btn.textContent='🙈';}
  else{inp.type='password';btn.textContent='👁';}
}

// Auto-redirect if already authenticated this session
if(sessionStorage.getItem(SESSION_KEY)==='1'){
  window.location.href='dashboard_v8.html';
}

document.getElementById('pw').focus();
</script>
</body>
</html>
